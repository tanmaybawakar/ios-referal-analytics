<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpendoX Referral Analytics</title>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <style>
        :root {
            --bg-dark: #0a0f1e;
            --card-bg: rgba(255, 255, 255, 0.08);
            --accent-indigo: #6366f1;
            --accent-violet: #8b5cf6;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        h1 {
            font-size: 1.75rem;
            background: linear-gradient(90deg, var(--accent-indigo), var(--accent-violet));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 700;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1.5rem;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .stat-card {
            display: flex;
            flex-direction: column;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0.5rem 0;
            background: linear-gradient(90deg, var(--accent-indigo), var(--accent-violet));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 1rem;
        }

        .top-source {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .top-source-value {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--success);
        }

        .chart-container {
            height: 400px;
            position: relative;
        }

        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        select {
            background: var(--card-bg);
            color: var(--text-light);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 0.5rem 1rem;
            backdrop-filter: blur(10px);
            cursor: pointer;
        }

        select:focus {
            outline: none;
            border-color: var(--accent-indigo);
        }

        .source-item {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .source-name {
            color: var(--text-muted);
        }

        .source-count {
            font-weight: 600;
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            
            .stats-container {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>ExpendoX Referral Analytics</h1>
            <div class="controls">
                <select id="dateRange">
                    <option value="7">Last 7 Days</option>
                    <option value="30">Last 30 Days</option>
                    <option value="all">All Time</option>
                </select>
            </div>
        </header>

        <div class="stats-container">
            <div class="card stat-card">
                <span class="stat-label">Total Responses</span>
                <div class="stat-value" id="totalResponses">0</div>
            </div>
            <div class="card stat-card">
                <span class="stat-label">Top Source</span>
                <div class="top-source">
                    <span class="stat-label">Source:</span>
                    <span class="top-source-value" id="topSource">-</span>
                </div>
                <div style="margin-top: 1rem;">
                    <span class="stat-label">Count:</span>
                    <span class="stat-value" id="topSourceCount">0</span>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="chart-container">
                <canvas id="referralChart"></canvas>
            </div>
        </div>

    <div class="card" style="margin-top: 1.5rem;">
        <h2 style="margin-bottom: 1rem;">Source Details</h2>
        <div id="sourceDetails"></div>
        <div id="loadingIndicator" style="text-align: center; padding: 1rem; display: none;">
            Loading data...
        </div>
        <div id="errorMessage" style="color: #ef4444; margin-top: 1rem; display: none;"></div>
    </div>

        <footer>
            <p>Data loaded at <span id="updateTime">-</span> | Auto-refresh every 60 seconds</p>
        </footer>
    </div>

    <script>
        // Check if Chart.js is loaded
        if (typeof Chart === 'undefined') {
            console.error('Chart.js failed to load');
        }
        
        // Check if Supabase is loaded
        if (typeof supabaseJs === 'undefined') {
            console.error('Supabase.js failed to load');
        }
        
        // Initialize Supabase
        const supabaseUrl = 'https://yibhtdussfucitorfzik.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlpYmh0ZHVzc2Z1Y2l0b3JmemlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTYxMzIsImV4cCI6MjA5MDQzMjEzMn0.l4WelyaUnRvX-73zwFHcA5lOsyZhtx-L83jS_ndLXcE';
        const supabase = supabaseJs.createClient(supabaseUrl, supabaseKey);

        // Chart.js configuration
        const ctx = document.getElementById('referralChart').getContext('2d');
        let referralChart;

        // Source labels
        const sources = ['Instagram', 'YouTube', 'Friend / Word of mouth', 'Reddit', 'App Store', 'Other', 'skipped'];

        // Initialize the dashboard
        async function initDashboard() {
            await fetchData();
            setupEventListeners();
            setInterval(fetchData, 60000); // Auto-refresh every 60 seconds
        }

        // Fetch data from Supabase
        async function fetchData() {
            const loadingIndicator = document.getElementById('loadingIndicator');
            const errorMessageElement = document.getElementById('errorMessage');
            
            // Show loading indicator and hide error message
            loadingIndicator.style.display = 'block';
            errorMessageElement.style.display = 'none';
            
            const dateRange = document.getElementById('dateRange').value;
            let query = supabase.from('referral_analytics').select('source, created_at');

            // Apply date range filter
            if (dateRange !== 'all') {
                const date = new Date();
                date.setDate(date.getDate() - parseInt(dateRange));
                query = query.gte('created_at', date.toISOString());
            }

            try {
                const { data, error } = await query;

                // Hide loading indicator
                loadingIndicator.style.display = 'none';

                if (error) {
                    throw new Error(error.message || 'Unknown error');
                }

                processData(data);
            } catch (error) {
                // Hide loading indicator
                loadingIndicator.style.display = 'none';
                
                console.error('Error fetching data:', error);
                errorMessageElement.textContent = `Error loading data: ${error.message}`;
                errorMessageElement.style.display = 'block';
                
                // Clear previous data
                document.getElementById('totalResponses').textContent = '0';
                document.getElementById('topSource').textContent = '-';
                document.getElementById('topSourceCount').textContent = '0';
                document.getElementById('sourceDetails').innerHTML = '';
                
                // Reset chart
                if (referralChart) {
                    referralChart.data.datasets[0].data = [0, 0, 0, 0, 0, 0, 0];
                    referralChart.update();
                }
            }
        }

        // Process data and update UI
        function processData(data) {
            // Count occurrences by source
            const counts = {};
            sources.forEach(source => counts[source] = 0);
            
            data.forEach(item => {
                const source = item.source || 'skipped';
                counts[source] = (counts[source] || 0) + 1;
            });

            // Calculate totals
            const totalResponses = data.length;
            const topSource = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
            const topSourceCount = counts[topSource];

            // Update stats
            document.getElementById('totalResponses').textContent = totalResponses;
            document.getElementById('topSource').textContent = topSource;
            document.getElementById('topSourceCount').textContent = topSourceCount;

            // Update source details
            const sourceDetails = document.getElementById('sourceDetails');
            sourceDetails.innerHTML = '';
            sources.forEach(source => {
                const div = document.createElement('div');
                div.className = 'source-item';
                div.innerHTML = `
                    <span class="source-name">${source}</span>
                    <span class="source-count">${counts[source] || 0}</span>
                `;
                sourceDetails.appendChild(div);
            });

            // Update chart
            updateChart(counts);
            
            // Update last refreshed time
            const now = new Date();
            document.getElementById('updateTime').textContent = now.toLocaleTimeString();
        }

        // Update chart with new data
        function updateChart(counts) {
            const chartData = sources.map(source => counts[source] || 0);
            
            if (referralChart) {
                referralChart.data.datasets[0].data = chartData;
                referralChart.update();
            } else {
                // Check if Chart.js is available
                if (typeof Chart === 'undefined') {
                    console.error('Chart.js is not available');
                    return;
                }
                
                referralChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: sources,
                        datasets: [{
                            label: 'Referrals by Source',
                            data: chartData,
                            backgroundColor: [
                                'rgba(99, 102, 241, 0.7)',
                                'rgba(139, 92, 246, 0.7)',
                                'rgba(16, 185, 129, 0.7)',
                                'rgba(245, 158, 11, 0.7)',
                                'rgba(236, 72, 153, 0.7)',
                                'rgba(59, 130, 246, 0.7)',
                                'rgba(156, 163, 175, 0.7)'
                            ],
                            borderColor: [
                                'rgb(99, 102, 241)',
                                'rgb(139, 92, 246)',
                                'rgb(16, 185, 129)',
                                'rgb(245, 158, 11)',
                                'rgb(236, 72, 153)',
                                'rgb(59, 130, 246)',
                                'rgb(156, 163, 175)'
                            ],
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    color: 'rgba(255, 255, 255, 0.7)'
                                },
                                grid: {
                                    color: 'rgba(255, 255, 255, 0.1)'
                                }
                            },
                            x: {
                                ticks: {
                                    color: 'rgba(255, 255, 255, 0.7)',
                                    maxRotation: 45,
                                    minRotation: 45
                                },
                                grid: {
                                    display: false
                                }
                            }
                        },
                        plugins: {
                            legend: {
                                labels: {
                                    color: 'rgba(255, 255, 255, 0.7)'
                                }
                            }
                        }
                    }
                });
            }
        }

        // Setup event listeners
        function setupEventListeners() {
            document.getElementById('dateRange').addEventListener('change', fetchData);
        }

        // Initialize the dashboard immediately
        initDashboard();
    </script>
</body>
</html>
