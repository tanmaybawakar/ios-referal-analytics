<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpendoX Referral Analytics</title>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <style>
        /* Light theme variables */
        :root {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --border-color: rgba(200, 200, 200, 0.3);
            --card-bg: rgba(255, 255, 255, 0.7);
            --shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
            --glass-border: rgba(255, 255, 255, 0.2);
            --primary: #3b82f6;
            --success: #10b981;
        }

        /* Dark theme variables */
        .dark-theme {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: rgba(100, 100, 100, 0.3);
            --card-bg: rgba(30, 41, 59, 0.7);
            --shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #60a5fa;
            --success: #34d399;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 2rem;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .theme-toggle {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            padding: 1.5rem;
            box-shadow: var(--shadow);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .stat-card {
            display: flex;
            flex-direction: column;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0.5rem 0;
            color: var(--primary);
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .top-source {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .top-source-value {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--success);
        }

        .chart-container {
            height: 400px;
            position: relative;
            padding: 1rem;
        }

        select {
            background: var(--card-bg);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.5rem 1rem;
            backdrop-filter: blur(10px);
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        select:focus {
            outline: none;
            border-color: var(--primary);
        }

        select:hover {
            background: rgba(255, 255, 255, 0.9);
        }

        .dark-theme select:hover {
            background: rgba(30, 41, 59, 0.9);
        }

        .source-item {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border-color);
        }

        .source-name {
            color: var(--text-secondary);
        }

        .source-count {
            font-weight: 600;
            color: var(--text-primary);
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Glass morphism effect */
        .glass {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            
            .stats-container {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 1.5rem;
            }
            
            .controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>ExpendoX Referral Analytics</h1>
            <div class="controls">
                <button id="themeToggle" class="theme-toggle">☀️</button>
                <select id="dateRange">
                    <option value="7">Last 7 Days</option>
                    <option value="30">Last 30 Days</option>
                    <option value="all">All Time</option>
                </select>
            </div>
        </header>

        <div class="stats-container">
            <div class="card stat-card">
                <span class="stat-label">Total Responses</span>
                <div class="stat-value" id="totalResponses">0</div>
            </div>
            <div class="card stat-card">
                <span class="stat-label">Top Source</span>
                <div class="top-source">
                    <span class="stat-label">Source:</span>
                    <span class="top-source-value" id="topSource">-</span>
                </div>
                <div style="margin-top: 1rem;">
                    <span class="stat-label">Count:</span>
                    <span class="stat-value" id="topSourceCount">0</span>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="chart-container">
                <canvas id="referralChart"></canvas>
            </div>
        </div>

    <div class="card" style="margin-top: 1.5rem;">
        <h2 style="margin-bottom: 1rem;">Source Details</h2>
        <div id="sourceDetails"></div>
        <div id="loadingIndicator" style="text-align: center; padding: 1rem; display: none;">
            Loading data...
        </div>
        <div id="errorMessage" style="color: #ef4444; margin-top: 1rem; display: none;"></div>
    </div>

        <footer>
            <p>Data loaded at <span id="updateTime">-</span> | Auto-refresh every 60 seconds</p>
        </footer>
    </div>

    <script>
        // Check if Chart.js is loaded
        if (typeof Chart === 'undefined') {
            console.error('Chart.js failed to load');
        }
        
        // Check if Supabase is loaded
        if (typeof supabaseJs === 'undefined') {
            console.error('Supabase.js failed to load');
        }
        
        // Initialize Supabase
        const supabaseUrl = 'https://yibhtdussfucitorfzik.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlpYmh0ZHVzc2Z1Y2l0b3JmemlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTYxMzIsImV4cCI6MjA5MDQzMjEzMn0.l4WelyaUnRvX-73zwFHcA5lOsyZhtx-L83jS_ndLXcE';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        // Theme toggle functionality
        function toggleTheme() {
            const body = document.body;
            const themeToggle = document.getElementById('themeToggle');
            
            body.classList.toggle('dark-theme');
            
            // Update button icon based on theme
            if (body.classList.contains('dark-theme')) {
                themeToggle.textContent = '🌙';
                localStorage.setItem('theme', 'dark');
            } else {
                themeToggle.textContent = '☀️';
                localStorage.setItem('theme', 'light');
            }
            
            // Re-render chart with new theme colors
            if (referralChart) {
                updateChartTheme();
            }
        }

        // Apply saved theme or default to light theme
        function applySavedTheme() {
            const savedTheme = localStorage.getItem('theme');
            const themeToggle = document.getElementById('themeToggle');
            
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.body.classList.add('dark-theme');
                themeToggle.textContent = '🌙';
            } else {
                themeToggle.textContent = '☀️';
            }
        }

        // Update chart colors based on theme
        function updateChartTheme() {
            if (!referralChart) return;
            
            const isDark = document.body.classList.contains('dark-theme');
            
            // Update axis colors
            referralChart.options.scales.x.ticks.color = isDark ? 'rgba(255, 255, 255, 0.7)' : 'rgba(0, 0, 0, 0.7)';
            referralChart.options.scales.y.ticks.color = isDark ? 'rgba(255, 255, 255, 0.7)' : 'rgba(0, 0, 0, 0.7)';
            referralChart.options.scales.x.grid.color = isDark ? 'rgba(255, 255, 255, 0.1)' : 'rgba(0, 0, 0, 0.1)';
            referralChart.options.scales.y.grid.color = isDark ? 'rgba(255, 255, 255, 0.1)' : 'rgba(0, 0, 0, 0.1)';
            referralChart.options.plugins.legend.labels.color = isDark ? 'rgba(255, 255, 255, 0.7)' : 'rgba(0, 0, 0, 0.7)';
            
            // Update chart colors
            const colors = isDark ? [
                'rgba(99, 102, 241, 0.8)',
                'rgba(139, 92, 246, 0.8)',
                'rgba(16, 185, 129, 0.8)',
                'rgba(245, 158, 11, 0.8)',
                'rgba(236, 72, 153, 0.8)',
                'rgba(59, 130, 246, 0.8)'
            ] : [
                'rgba(99, 102, 241, 0.7)',
                'rgba(139, 92, 246, 0.7)',
                'rgba(16, 185, 129, 0.7)',
                'rgba(245, 158, 11, 0.7)',
                'rgba(236, 72, 153, 0.7)',
                'rgba(59, 130, 246, 0.7)'
            ];
            
            const borderColors = isDark ? [
                'rgb(99, 102, 241)',
                'rgb(139, 92, 246)',
                'rgb(16, 185, 129)',
                'rgb(245, 158, 11)',
                'rgb(236, 72, 153)',
                'rgb(59, 130, 246)'
            ] : [
                'rgb(99, 102, 241)',
                'rgb(139, 92, 246)',
                'rgb(16, 185, 129)',
                'rgb(245, 158, 11)',
                'rgb(236, 72, 153)',
                'rgb(59, 130, 246)'
            ];
            
            referralChart.data.datasets[0].backgroundColor = colors;
            referralChart.data.datasets[0].borderColor = borderColors;
            referralChart.update();
        }

        // Chart.js configuration
        const ctx = document.getElementById('referralChart').getContext('2d');
        let referralChart;

        // Source labels
        const sources = ['Instagram', 'YouTube', 'Friend / Word of mouth', 'Reddit', 'App Store', 'Other'];

        // Initialize the dashboard
        async function initDashboard() {
            applySavedTheme();
            await fetchData();
            setupEventListeners();
            setInterval(fetchData, 60000); // Auto-refresh every 60 seconds
        }

        // Fetch data from Supabase
        async function fetchData() {
            const loadingIndicator = document.getElementById('loadingIndicator');
            const errorMessageElement = document.getElementById('errorMessage');
            
            // Show loading indicator and hide error message
            loadingIndicator.style.display = 'block';
            errorMessageElement.style.display = 'none';
            
            const dateRange = document.getElementById('dateRange').value;
            let query = supabase.from('referral_analytics').select('source, created_at');

            // Apply date range filter
            if (dateRange !== 'all') {
                const date = new Date();
                date.setDate(date.getDate() - parseInt(dateRange));
                query = query.gte('created_at', date.toISOString());
            }

            try {
                const { data, error } = await query;

                // Hide loading indicator
                loadingIndicator.style.display = 'none';

                if (error) {
                    throw new Error(error.message || 'Unknown error');
                }

                processData(data);
            } catch (error) {
                // Hide loading indicator
                loadingIndicator.style.display = 'none';
                
                console.error('Error fetching data:', error);
                errorMessageElement.textContent = `Error loading data: ${error.message}`;
                errorMessageElement.style.display = 'block';
                
                // Clear previous data
                document.getElementById('totalResponses').textContent = '0';
                document.getElementById('topSource').textContent = '-';
                document.getElementById('topSourceCount').textContent = '0';
                document.getElementById('sourceDetails').innerHTML = '';
                
                // Reset chart
                if (referralChart) {
                    referralChart.data.datasets[0].data = [0, 0, 0, 0, 0, 0];
                    referralChart.update();
                }
            }
        }

        // Process data and update UI
        function processData(data) {
            // Count occurrences by source
            const counts = {};
            sources.forEach(source => counts[source] = 0);
            
            data.forEach(item => {
                const source = item.source || 'Other';
                counts[source] = (counts[source] || 0) + 1;
            });

            // Calculate totals
            const totalResponses = data.length;
            const topSource = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
            const topSourceCount = counts[topSource];

            // Update stats
            document.getElementById('totalResponses').textContent = totalResponses;
            document.getElementById('topSource').textContent = topSource;
            document.getElementById('topSourceCount').textContent = topSourceCount;

            // Update source details
            const sourceDetails = document.getElementById('sourceDetails');
            sourceDetails.innerHTML = '';
            sources.forEach(source => {
                const div = document.createElement('div');
                div.className = 'source-item';
                div.innerHTML = `
                    <span class="source-name">${source}</span>
                    <span class="source-count">${counts[source] || 0}</span>
                `;
                sourceDetails.appendChild(div);
            });

            // Update chart
            updateChart(counts);
            
            // Update last refreshed time
            const now = new Date();
            document.getElementById('updateTime').textContent = now.toLocaleTimeString();
        }

        // Update chart with new data
        function updateChart(counts) {
            const chartData = sources.map(source => counts[source] || 0);
            
            if (referralChart) {
                referralChart.data.datasets[0].data = chartData;
                updateChartTheme();
                referralChart.update();
            } else {
                // Check if Chart.js is available
                if (typeof Chart === 'undefined') {
                    console.error('Chart.js is not available');
                    return;
                }
                
                referralChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: sources,
                        datasets: [{
                            label: 'Referrals by Source',
                            data: chartData,
                            backgroundColor: [
                                'rgba(99, 102, 241, 0.7)',
                                'rgba(139, 92, 246, 0.7)',
                                'rgba(16, 185, 129, 0.7)',
                                'rgba(245, 158, 11, 0.7)',
                                'rgba(236, 72, 153, 0.7)',
                                'rgba(59, 130, 246, 0.7)'
                            ],
                            borderColor: [
                                'rgb(99, 102, 241)',
                                'rgb(139, 92, 246)',
                                'rgb(16, 185, 129)',
                                'rgb(245, 158, 11)',
                                'rgb(236, 72, 153)',
                                'rgb(59, 130, 246)'
                            ],
                            borderWidth: 1,
                            borderRadius: 8,
                            borderSkipped: false,
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                labels: {
                                    color: 'rgba(0, 0, 0, 0.7)',
                                    font: {
                                        size: 14
                                    }
                                }
                            },
                            tooltip: {
                                backgroundColor: 'rgba(30, 41, 59, 0.9)',
                                titleColor: 'rgba(255, 255, 255, 1)',
                                bodyColor: 'rgba(255, 255, 255, 0.8)',
                                borderColor: 'rgba(255, 255, 255, 0.1)',
                                borderWidth: 1,
                                cornerRadius: 8,
                                displayColors: false
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                grid: {
                                    color: 'rgba(0, 0, 0, 0.1)'
                                },
                                ticks: {
                                    color: 'rgba(0, 0, 0, 0.7)'
                                }
                            },
                            x: {
                                grid: {
                                    display: false
                                },
                                ticks: {
                                    color: 'rgba(0, 0, 0, 0.7)',
                                    maxRotation: 45,
                                    minRotation: 45
                                }
                            }
                        },
                        animation: {
                            duration: 1000,
                            easing: 'easeInOutQuart'
                        }
                    }
                });
                
                // Apply theme to the chart
                updateChartTheme();
            }
        }

        // Setup event listeners
        function setupEventListeners() {
            document.getElementById('dateRange').addEventListener('change', fetchData);
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);
        }

        // Initialize the dashboard immediately
        initDashboard();
    </script>
</body>
</html>
